<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortal Kombat JS</title>
    <link rel="stylesheet" href="style.css">
    <style>
      @media (max-width: 600px) {
        #legend {
          display: none !important;
        }
      }
    </style>
</head>
<body>
    <audio id="bg-music" src="assets/theme.mp3" loop></audio>
    <audio id="win-sound" src="assets/win.mp3"></audio>
    <div id="name-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <h2 style="color:#fff;">Enter Player Names</h2>
        <input id="name-left" type="text" placeholder="Left Player Name" style="font-size:1.2em;margin:10px;padding:8px;" maxlength="12">
        <input id="name-right" type="text" placeholder="Right Player Name" style="font-size:1.2em;margin:10px;padding:8px;" maxlength="12">
        <button id="start-names" style="font-size:1.2em;padding:10px 30px;margin-top:20px;">Start Game</button>
    </div>
    <div id="game-container">
        <canvas id="game-canvas" width="1280" height="720"></canvas>
    </div>
    <div id="mobile-controls" style="display:none;">
        <button id="btn-left">Left</button>
        <button id="btn-right">Right</button>
        <button id="btn-attack">Attack</button>
        <button id="btn-heavy">Heavy Attack</button>
    </div>
            </div>
    <div id="legend" style="position:fixed; left:0; right:0; bottom:0; z-index:9999; text-align:center; font-size:1.1em; color:#fff; background:rgba(187, 93, 16, 0); border-radius:8px 8px 0 0; padding:10px 0 14px 0; max-width:100vw; box-shadow:0 -2px 12px rgba(0,0,0,0.08);">
        <strong>Controls:</strong><br>
        <span style="color:#0074D9;">Player One</span>: Move (A/D), Basic Attack (W), Strong Attack (S)<br>
        <span style="color:#FF4136;">Player Two</span>: Move (←/→), Basic Attack (↑), Strong Attack (↓)
    </div>
    <script src="script.js"></script>
</body>
</html>
